<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocuFlow - Markdown to Word</title>
    <!-- Word-specific meta tags to help with pasting -->
    <meta name="title" content="DocuFlow Export">
    <script>
      (function() {
        try {
          var desc = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (desc && desc.get && !desc.set && desc.configurable) {
            Object.defineProperty(window, 'fetch', {
              get: desc.get,
              set: function(val) { console.warn("Absorbed fetch set:", val); },
              configurable: true,
              enumerable: desc.enumerable
            });
          }
        } catch(e) {
          console.error("Fetch polyfill fix failed", e);
        }
      })();
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="root"></div>
    <!-- Vite Entry Point -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
